<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}V Collective Estates{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: #ffffff;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 1px solid #222;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 40px 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #aaa;
        }

        .cta {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: white;
            color: black;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <div><strong>V Collective Estates</strong></div>
    <nav>
        <a href="/">Home</a>
        <a href="/services">Services</a>
        <a href="/how-it-works">How It Works</a>
        <a href="/pricing">Pricing</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
    </nav>
</header>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
