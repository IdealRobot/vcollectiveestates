{% extends "base.html" %}

{% block title %}Contact | V Collective Estates{% endblock %}

{% block content %}

<section class="text-center mb-4">
    <h1>Contact</h1>
    <p class="mt-2">
        Schedule a consultation or ask a question. We’ll get back to you promptly.
    </p>
</section>

<section class="card">

    <form class="form">

        <div class="form-group">
            <input type="text" placeholder="Name" required>
        </div>

        <div class="form-group">
            <input type="email" placeholder="Email" required>
        </div>

        <div class="form-group">
            <textarea placeholder="Message" rows="5" required></textarea>
        </div>

        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Submit</button>
        </div>

    </form>

</section>

{% endblock %}
